    "gitpython>=3.1.46",
    "gradio>=5.41.0,<6.0",
    "inseq>=0.6.0",
    "ipython>=9.4.0",
    "ipywidgets>=8.1.7",
    "jinja2>=3.1.6",
    "jupyter>=1.1.1",
    "jupyterlab>=4.4.5",
    "librosa>=0.11.0",
